<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReactSynth+ - v0.6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>ReactSynth+</h1>
            <div id="perf-monitor" style="font-size: 0.75rem; color: #888; font-family: monospace;">
                FPS: <span id="fps-counter">--</span> | Voices: <span id="voice-counter">0</span>
            </div>
        </header>

        <section class="visualizer-container">
            <canvas id="oscilloscope"></canvas>
        </section>

        <section class="controls">
            <button id="start-audio">INITIALIZE AUDIO ENGINE</button>
            
            <div class="module oscillator">
                <h3>Oscillator 1</h3>
                <label>Wavetable
                    <select id="wavetable-select">
                        <option value="basic">Basic Shapes</option>
                        <option value="harmonic">Harmonic Series</option>
                    </select>
                </label>
                <label>WT POS <input type="range" id="wt-pos" min="0" max="1" step="0.01" value="0"></label>
            </div>

            <div class="module sub-osc">
                <h3>Sub Oscillator</h3>
                <label>Waveform
                    <select id="sub-type">
                        <option value="sine">Sine</option>
                        <option value="square" selected>Square</option>
                        <option value="sawtooth">Sawtooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </label>
                <label>Volume <input type="range" id="sub-volume" min="0" max="1" step="0.01" value="0.5"></label>
                <label>Octave
                    <select id="sub-octave">
                        <option value="-1">-1 Oct</option>
                        <option value="-2" selected>-2 Oct</option>
                    </select>
                </label>
            </div>

            <div class="module noise">
                <h3>Noise Gen</h3>
                <label>Type
                    <select id="noise-type">
                        <option value="white">White</option>
                        <option value="pink">Pink</option>
                        <option value="brown">Brown</option>
                    </select>
                </label>
                <label>Volume <input type="range" id="noise-volume" min="0" max="1" step="0.01" value="0"></label>
            </div>

            <div class="module filter">
                <h3>Filter</h3>
                <label>Mode
                    <select id="filter-type">
                        <option value="lowpass">Lowpass</option>
                        <option value="highpass">Highpass</option>
                        <option value="bandpass">Bandpass</option>
                    </select>
                </label>
                <label>Cutoff <input type="range" id="filter-cutoff" min="20" max="10000" value="2000"></label>
            </div>

            <div class="module lfo">
                <h3>LFO 1</h3>
                <label>Shape
                    <select id="lfo-type">
                        <option value="sine">Sine</option>
                        <option value="square">Square</option>
                        <option value="sawtooth">Sawtooth</option>
                        <option value="triangle">Triangle</option>
                    </select>
                </label>
                <label>Rate (Hz) <input type="range" id="lfo-rate" min="0.1" max="20" step="0.1" value="1"></label>
                <label>Depth <input type="range" id="lfo-depth" min="0" max="1200" step="1" value="0"></label>
                <label>Target
                    <select id="lfo-target">
                        <option value="none">None</option>
                        <option value="cutoff">Filter Cutoff</option>
                        <option value="pitch">Pitch</option>
                    </select>
                </label>
            </div>

            <div class="module envelope">
                <h3>Master Envelope</h3>
                <label>Attack <input type="range" id="env-attack" min="0" max="2" step="0.01" value="0.1"></label>
                <label>Release <input type="range" id="env-release" min="0" max="5" step="0.01" value="1"></label>
            </div>

            <div class="module fx">
                <h3>FX Rack</h3>
                <label>Distortion <input type="range" id="fx-dist" min="0" max="1" step="0.01" value="0"></label>
                <label>Reverb Mix <input type="range" id="fx-reverb-mix" min="0" max="1" step="0.01" value="0.1"></label>
                <div class="fx-divider"></div>
                <label>Delay Mix <input type="range" id="fx-delay-mix" min="0" max="1" step="0.01" value="0"></label>
                <label>Delay Time <input type="range" id="fx-delay-time" min="0" max="1" step="0.01" value="0.3"></label>
                <label>Delay FB <input type="range" id="fx-delay-feedback" min="0" max="1" step="0.01" value="0.4"></label>
            </div>
        </section>

        <section class="play-zone">
            <div class="keyboard">
                <div class="key white" data-note="C4" data-key="a"><span>A</span></div>
                <div class="key black" data-note="C#4" data-key="w"><span>W</span></div>
                <div class="key white" data-note="D4" data-key="s"><span>S</span></div>
                <div class="key black" data-note="D#4" data-key="e"><span>E</span></div>
                <div class="key white" data-note="E4" data-key="d"><span>D</span></div>
                <div class="key white" data-note="F4" data-key="f"><span>F</span></div>
                <div class="key black" data-note="F#4" data-key="t"><span>T</span></div>
                <div class="key white" data-note="G4" data-key="g"><span>G</span></div>
                <div class="key black" data-note="G#4" data-key="y"><span>Y</span></div>
                <div class="key white" data-note="A4" data-key="h"><span>H</span></div>
                <div class="key black" data-note="A#4" data-key="u"><span>U</span></div>
                <div class="key white" data-note="B4" data-key="j"><span>J</span></div>
                <div class="key white" data-note="C5" data-key="k"><span>K</span></div>
            </div>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="main.js"></script>
</body>
</html>
